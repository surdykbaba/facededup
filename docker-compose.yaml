services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: facededup-api
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://facededup:changeme@postgres:5432/facededup
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - image-data:/data/images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: facededup-postgres
    environment:
      POSTGRES_USER: facededup
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: facededup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facededup"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: facededup-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  image-data:
