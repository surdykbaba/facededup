name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/${{ secrets.DO_USER }}/facededup

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Updating .env rate limits ==="
            sed -i 's/^RATE_LIMIT_REQUESTS=.*/RATE_LIMIT_REQUESTS=6000/' .env
            sed -i 's/^RATE_LIMIT_WINDOW_SECONDS=.*/RATE_LIMIT_WINDOW_SECONDS=60/' .env
            grep -q '^BATCH_RATE_LIMIT_REQUESTS=' .env && sed -i 's/^BATCH_RATE_LIMIT_REQUESTS=.*/BATCH_RATE_LIMIT_REQUESTS=1000/' .env || echo 'BATCH_RATE_LIMIT_REQUESTS=1000' >> .env
            grep -q '^BATCH_RATE_LIMIT_WINDOW_SECONDS=' .env && sed -i 's/^BATCH_RATE_LIMIT_WINDOW_SECONDS=.*/BATCH_RATE_LIMIT_WINDOW_SECONDS=60/' .env || echo 'BATCH_RATE_LIMIT_WINDOW_SECONDS=60' >> .env
            grep -q '^BATCH_MAX_IMAGES=' .env && sed -i 's/^BATCH_MAX_IMAGES=.*/BATCH_MAX_IMAGES=500/' .env || echo 'BATCH_MAX_IMAGES=500' >> .env
            grep -q '^BATCH_MAX_EMBEDDINGS=' .env && sed -i 's/^BATCH_MAX_EMBEDDINGS=.*/BATCH_MAX_EMBEDDINGS=5000/' .env || echo 'BATCH_MAX_EMBEDDINGS=5000' >> .env
            # Server 1 also runs PostgreSQL + Redis + nginx LB — give them CPU headroom
            # 15 workers × 2 ONNX threads = 30 cores API, ~30 cores for PG/Redis/nginx/OS
            sed -i 's/^WORKERS=.*/WORKERS=15/' .env
            grep -q '^WORKERS=' .env || echo 'WORKERS=15' >> .env
            # DB pool: 15 workers × (3 pool + 1 overflow) = 60 connections
            grep -q '^DB_POOL_SIZE=' .env && sed -i 's/^DB_POOL_SIZE=.*/DB_POOL_SIZE=3/' .env || echo 'DB_POOL_SIZE=3' >> .env
            grep -q '^DB_MAX_OVERFLOW=' .env && sed -i 's/^DB_MAX_OVERFLOW=.*/DB_MAX_OVERFLOW=1/' .env || echo 'DB_MAX_OVERFLOW=1' >> .env
            # 2 ONNX threads per worker — maximizes worker count on 80 cores
            grep -q '^OMP_NUM_THREADS=' .env && sed -i 's/^OMP_NUM_THREADS=.*/OMP_NUM_THREADS=2/' .env || echo 'OMP_NUM_THREADS=2' >> .env
            # Faster detection for bulk enrollment (320x320 vs 640x640 = ~4x faster)
            grep -q '^FACE_DET_SIZE=' .env && sed -i 's/^FACE_DET_SIZE=.*/FACE_DET_SIZE=320,320/' .env || echo 'FACE_DET_SIZE=320,320' >> .env
            # Disable expensive checks for bulk enrollment
            grep -q '^LIVENESS_ENROLL_REQUIRED=' .env && sed -i 's/^LIVENESS_ENROLL_REQUIRED=.*/LIVENESS_ENROLL_REQUIRED=False/' .env || echo 'LIVENESS_ENROLL_REQUIRED=False' >> .env
            grep -q '^MULTIFRAME_ENROLL_REQUIRED=' .env && sed -i 's/^MULTIFRAME_ENROLL_REQUIRED=.*/MULTIFRAME_ENROLL_REQUIRED=False/' .env || echo 'MULTIFRAME_ENROLL_REQUIRED=False' >> .env
            grep -q '^ANTISPOOF_ENABLED=' .env && sed -i 's/^ANTISPOOF_ENABLED=.*/ANTISPOOF_ENABLED=False/' .env || echo 'ANTISPOOF_ENABLED=False' >> .env
            grep -q '^ENROLL_DEDUP_ENABLED=' .env && sed -i 's/^ENROLL_DEDUP_ENABLED=.*/ENROLL_DEDUP_ENABLED=False/' .env || echo 'ENROLL_DEDUP_ENABLED=False' >> .env
            # Similarity threshold for dedup matching
            grep -q '^SIMILARITY_THRESHOLD=' .env && sed -i 's/^SIMILARITY_THRESHOLD=.*/SIMILARITY_THRESHOLD=0.6/' .env || echo 'SIMILARITY_THRESHOLD=0.6' >> .env
            # Worker node URLs for cluster health monitoring
            grep -q '^WORKER_URLS=' .env && sed -i 's|^WORKER_URLS=.*|WORKER_URLS=http://10.8.1.14|' .env || echo 'WORKER_URLS=http://10.8.1.14' >> .env
            cat .env | grep -E 'RATE_LIMIT|BATCH|WORKERS|POOL|LIVENESS|ANTISPOOF|DEDUP|SIMILARITY|OMP_NUM|FACE_DET|WORKER_URLS'

            echo "=== Generate self-signed cert for idcentra.com (Cloudflare terminates real SSL) ==="
            mkdir -p nginx/ssl
            if [ ! -f nginx/ssl/idcentra.com.crt ]; then
              openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout nginx/ssl/idcentra.com.key \
                -out nginx/ssl/idcentra.com.crt \
                -subj "/CN=idcentra.com" \
                -addext "subjectAltName=DNS:idcentra.com,DNS:www.idcentra.com"
              echo "Generated self-signed cert for idcentra.com"
            else
              echo "Self-signed cert for idcentra.com already exists"
            fi

            echo "=== Building Docker images ==="
            docker compose -f docker-compose.prod.yaml build

            echo "=== Restarting services ==="
            docker compose -f docker-compose.prod.yaml up -d --remove-orphans

            echo "=== Waiting for API to be healthy (35 workers loading models ~3-5 min) ==="
            for i in $(seq 1 150); do
              if curl -sf http://localhost/api/v1/health > /dev/null 2>&1; then
                echo "API is healthy after $((i * 2)) seconds!"
                break
              fi
              if [ "$i" -eq 150 ]; then
                echo "ERROR: API failed health check after 300 seconds"
                docker compose -f docker-compose.prod.yaml logs --tail=100 api
                exit 1
              fi
              sleep 2
            done

            echo "=== Running database migrations ==="
            docker compose -f docker-compose.prod.yaml exec -T api alembic upgrade head

            echo "=== Reload nginx config (volume mounts don't trigger container restart) ==="
            docker exec facededup-nginx nginx -s reload 2>&1 || true

            echo "=== Deployment complete ==="
            curl -sf http://localhost/api/v1/health 2>&1 || echo "Health check endpoint returned non-JSON (may still be starting)"
