name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/${{ secrets.DO_USER }}/facededup

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Updating .env rate limits ==="
            sed -i 's/^RATE_LIMIT_REQUESTS=.*/RATE_LIMIT_REQUESTS=6000/' .env
            sed -i 's/^RATE_LIMIT_WINDOW_SECONDS=.*/RATE_LIMIT_WINDOW_SECONDS=60/' .env
            grep -q '^BATCH_RATE_LIMIT_REQUESTS=' .env && sed -i 's/^BATCH_RATE_LIMIT_REQUESTS=.*/BATCH_RATE_LIMIT_REQUESTS=1000/' .env || echo 'BATCH_RATE_LIMIT_REQUESTS=1000' >> .env
            grep -q '^BATCH_RATE_LIMIT_WINDOW_SECONDS=' .env && sed -i 's/^BATCH_RATE_LIMIT_WINDOW_SECONDS=.*/BATCH_RATE_LIMIT_WINDOW_SECONDS=60/' .env || echo 'BATCH_RATE_LIMIT_WINDOW_SECONDS=60' >> .env
            grep -q '^BATCH_MAX_IMAGES=' .env && sed -i 's/^BATCH_MAX_IMAGES=.*/BATCH_MAX_IMAGES=500/' .env || echo 'BATCH_MAX_IMAGES=500' >> .env
            grep -q '^BATCH_MAX_EMBEDDINGS=' .env && sed -i 's/^BATCH_MAX_EMBEDDINGS=.*/BATCH_MAX_EMBEDDINGS=5000/' .env || echo 'BATCH_MAX_EMBEDDINGS=5000' >> .env
            sed -i 's/^WORKERS=.*/WORKERS=8/' .env
            grep -q '^WORKERS=' .env || echo 'WORKERS=8' >> .env
            # DB pool for concurrent workers
            grep -q '^DB_POOL_SIZE=' .env && sed -i 's/^DB_POOL_SIZE=.*/DB_POOL_SIZE=50/' .env || echo 'DB_POOL_SIZE=50' >> .env
            grep -q '^DB_MAX_OVERFLOW=' .env && sed -i 's/^DB_MAX_OVERFLOW=.*/DB_MAX_OVERFLOW=25/' .env || echo 'DB_MAX_OVERFLOW=25' >> .env
            # Disable expensive checks for bulk enrollment
            grep -q '^LIVENESS_ENROLL_REQUIRED=' .env && sed -i 's/^LIVENESS_ENROLL_REQUIRED=.*/LIVENESS_ENROLL_REQUIRED=False/' .env || echo 'LIVENESS_ENROLL_REQUIRED=False' >> .env
            grep -q '^MULTIFRAME_ENROLL_REQUIRED=' .env && sed -i 's/^MULTIFRAME_ENROLL_REQUIRED=.*/MULTIFRAME_ENROLL_REQUIRED=False/' .env || echo 'MULTIFRAME_ENROLL_REQUIRED=False' >> .env
            grep -q '^ANTISPOOF_ENABLED=' .env && sed -i 's/^ANTISPOOF_ENABLED=.*/ANTISPOOF_ENABLED=False/' .env || echo 'ANTISPOOF_ENABLED=False' >> .env
            grep -q '^ENROLL_DEDUP_ENABLED=' .env && sed -i 's/^ENROLL_DEDUP_ENABLED=.*/ENROLL_DEDUP_ENABLED=False/' .env || echo 'ENROLL_DEDUP_ENABLED=False' >> .env
            # Similarity threshold for dedup matching
            grep -q '^SIMILARITY_THRESHOLD=' .env && sed -i 's/^SIMILARITY_THRESHOLD=.*/SIMILARITY_THRESHOLD=0.6/' .env || echo 'SIMILARITY_THRESHOLD=0.6' >> .env
            cat .env | grep -E 'RATE_LIMIT|BATCH|WORKERS|POOL|LIVENESS|ANTISPOOF|DEDUP|SIMILARITY'

            echo "=== Building Docker images ==="
            docker compose -f docker-compose.prod.yaml build

            echo "=== Restarting services ==="
            docker compose -f docker-compose.prod.yaml up -d --remove-orphans

            echo "=== Waiting for API to be healthy ==="
            for i in $(seq 1 90); do
              if curl -sf http://localhost/api/v1/health > /dev/null 2>&1; then
                echo "API is healthy!"
                break
              fi
              if [ "$i" -eq 90 ]; then
                echo "ERROR: API failed health check after 90 seconds"
                docker compose -f docker-compose.prod.yaml logs --tail=50 api
                exit 1
              fi
              sleep 2
            done

            echo "=== Running database migrations ==="
            docker compose -f docker-compose.prod.yaml exec -T api alembic upgrade head

            echo "=== Deployment complete ==="
            curl -s http://localhost/api/v1/health | python3 -m json.tool
