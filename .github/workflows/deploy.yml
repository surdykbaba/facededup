name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/${{ secrets.DO_USER }}/facededup

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Building Docker images ==="
            docker compose -f docker-compose.prod.yaml build

            echo "=== Restarting services ==="
            docker compose -f docker-compose.prod.yaml up -d --remove-orphans

            echo "=== Waiting for API to be healthy ==="
            for i in $(seq 1 90); do
              if curl -sf http://localhost/api/v1/health > /dev/null 2>&1; then
                echo "API is healthy!"
                break
              fi
              if [ "$i" -eq 90 ]; then
                echo "ERROR: API failed health check after 90 seconds"
                docker compose -f docker-compose.prod.yaml logs --tail=50 api
                exit 1
              fi
              sleep 2
            done

            echo "=== Running database migrations ==="
            docker compose -f docker-compose.prod.yaml exec -T api alembic upgrade head

            echo "=== Deployment complete ==="
            curl -s http://localhost/api/v1/health | python3 -m json.tool
