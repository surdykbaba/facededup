name: Diagnose Load Balancer

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check nginx + load balancer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Diagnose via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            set -e
            echo "=== Find idcentra containers (running + stopped) ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}" | grep -i "idcent\|_be" || echo "No idcentra containers found"

            echo ""
            echo "=== All containers ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}"

            echo ""
            echo "=== Check idcentra docker-compose files ==="
            find /home -name "docker-compose*" -path "*idcent*" 2>/dev/null || echo "No idcentra docker-compose found"
            find /home -name "docker-compose*" 2>/dev/null | head -10

            echo ""
            echo "=== Test api.rhwdp.gov.ng via our nginx ==="
            curl -sf --max-time 5 -H "Host: api.rhwdp.gov.ng" http://127.0.0.1/ 2>&1 | head -5 || echo "FAILED"

            echo ""
            echo "=== Test idcentra.com via our nginx ==="
            curl -sf --max-time 5 -H "Host: idcentra.com" http://127.0.0.1/ 2>&1 | head -5 || echo "FAILED"

            echo ""
            echo "=== Nginx config test ==="
            docker exec facededup-nginx nginx -t 2>&1
