name: Diagnose Load Balancer

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check nginx + load balancer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fix idcentra-api on Server 2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.WORKER_HOST }}
          username: ${{ secrets.WORKER_USER }}
          password: ${{ secrets.WORKER_PASSWORD }}
          proxy_host: ${{ secrets.DO_HOST }}
          proxy_username: ${{ secrets.DO_USER }}
          proxy_password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            set -e
            IDCENTRA_DIR="/var/www/html/idcentra_be"

            echo "=== idcentra containers status ==="
            docker ps -a --filter "name=idcentra" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== idcentra-api logs (last 30 lines) ==="
            cd "$IDCENTRA_DIR"
            docker compose logs --tail=30 idcentra-api 2>/dev/null || docker logs idcentra-api --tail=30 2>&1 || echo "No logs"

            echo ""
            echo "=== Restart idcentra-api ==="
            cd "$IDCENTRA_DIR"
            docker compose up -d 2>/dev/null || true
            sleep 5
            docker ps -a --filter "name=idcentra" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== Test idcentra-api on port 15909 ==="
            curl -sf --max-time 5 http://127.0.0.1:15909/ 2>&1 | head -5 || echo "Port 15909 not responding"
            curl -v --max-time 5 http://127.0.0.1:15909/ 2>&1 | head -10 || true

      - name: Reload nginx + verify on Server 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            set -e
            echo "=== Reload nginx config ==="
            docker exec facededup-nginx nginx -s reload 2>&1

            echo ""
            echo "=== Verify nginx config for idcentra ==="
            docker exec facededup-nginx cat /etc/nginx/conf.d/rhwdp.conf 2>&1

            echo ""
            echo "=== Test connectivity to 10.8.1.14:15909 ==="
            curl -v --max-time 5 http://10.8.1.14:15909/ 2>&1 | head -10 || echo "Can't reach 10.8.1.14:15909"

            echo ""
            echo "=== Test idcentra.com via nginx ==="
            curl -v --max-time 5 -H "Host: idcentra.com" http://127.0.0.1/ 2>&1 | head -15 || echo "FAILED"

            echo ""
            echo "=== Test api.rhwdp.gov.ng via nginx ==="
            curl -sk --max-time 5 -H "Host: api.rhwdp.gov.ng" https://127.0.0.1/ 2>&1 | head -3 || echo "FAILED"

            echo ""
            echo "=== Nginx config test ==="
            docker exec facededup-nginx nginx -t 2>&1
