name: Diagnose Load Balancer

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check nginx + load balancer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify idcentra on Server 2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.WORKER_HOST }}
          username: ${{ secrets.WORKER_USER }}
          password: ${{ secrets.WORKER_PASSWORD }}
          proxy_host: ${{ secrets.DO_HOST }}
          proxy_username: ${{ secrets.DO_USER }}
          proxy_password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            set -e
            echo "=== Server 2: idcentra containers ==="
            docker ps --filter "name=idcentra" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== Test idcentra-api on port 15909 ==="
            curl -sf --max-time 5 http://127.0.0.1:15909/ 2>&1 | head -5 || echo "Port 15909 FAILED or returned error"

            echo ""
            echo "=== Test idcentra-api health/readiness ==="
            curl -sf --max-time 5 http://127.0.0.1:15909/health 2>&1 | head -5 || echo "No /health endpoint"
            curl -sf --max-time 5 http://127.0.0.1:15909/api 2>&1 | head -5 || echo "No /api endpoint"
            curl -sf --max-time 5 http://127.0.0.1:15909/api/v1 2>&1 | head -5 || echo "No /api/v1 endpoint"

      - name: Verify nginx proxy on Server 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            set -e
            echo "=== Server 1: containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | head -10

            echo ""
            echo "=== Test connectivity to idcentra-api on Server 2 ==="
            curl -sf --max-time 5 http://10.8.1.14:15909/ 2>&1 | head -5 || echo "FAILED: Can't reach 10.8.1.14:15909"

            echo ""
            echo "=== Test idcentra.com via nginx (port 80) ==="
            curl -sf --max-time 5 -H "Host: idcentra.com" http://127.0.0.1/ 2>&1 | head -5 || echo "FAILED"

            echo ""
            echo "=== Test idcentra.com via nginx (port 443) ==="
            curl -sk --max-time 5 -H "Host: idcentra.com" https://127.0.0.1/ 2>&1 | head -5 || echo "FAILED"

            echo ""
            echo "=== Test api.rhwdp.gov.ng via nginx ==="
            curl -sk --max-time 5 -H "Host: api.rhwdp.gov.ng" https://127.0.0.1/ 2>&1 | head -5 || echo "FAILED"

            echo ""
            echo "=== Test facededup API ==="
            curl -sf --max-time 5 http://127.0.0.1/api/v1/health 2>&1 | head -3 || echo "FAILED"

            echo ""
            echo "=== Nginx config test ==="
            docker exec facededup-nginx nginx -t 2>&1
