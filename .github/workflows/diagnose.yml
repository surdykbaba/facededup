name: Diagnose Load Balancer

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check nginx + load balancer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check idcentra on Server 2
        uses: appleboy/ssh-action@v1
        env:
          SUDO_PASS: ${{ secrets.WORKER_PASSWORD || secrets.DO_PASSWORD }}
        with:
          host: ${{ secrets.WORKER_HOST }}
          username: ${{ secrets.WORKER_USER }}
          password: ${{ secrets.WORKER_PASSWORD }}
          proxy_host: ${{ secrets.DO_HOST }}
          proxy_username: ${{ secrets.DO_USER }}
          proxy_password: ${{ secrets.DO_PASSWORD }}
          envs: SUDO_PASS
          command_timeout: 3m
          script: |
            set -e
            run_sudo() {
              echo "$SUDO_PASS" | sudo -S "$@"
            }

            # Stop conflicting Docker container (it conflicts with native process on port 8999)
            echo "=== Stopping idcentra Docker container ==="
            IDCENTRA_DIR="/var/www/html/idcentra_be"
            if [ -d "$IDCENTRA_DIR" ]; then
              cd "$IDCENTRA_DIR"
              docker compose down 2>/dev/null || true
            fi

            echo ""
            echo "=== Open firewall for port 8999 from Server 1 ==="
            run_sudo iptables -C INPUT -p tcp --dport 8999 -s 10.8.1.10 -j ACCEPT 2>/dev/null || \
              run_sudo iptables -I INPUT 1 -p tcp --dport 8999 -s 10.8.1.10 -j ACCEPT 2>/dev/null || true

            echo ""
            echo "=== Native processes on idcentra ports ==="
            run_sudo ss -tlnp | grep -E '8999|9000|9010|15909' || echo "No processes found"

            echo ""
            echo "=== Test idcentra native backend on port 8999 locally ==="
            curl -v --max-time 5 http://127.0.0.1:8999/ 2>&1 | head -15 || echo "Port 8999 not responding"

      - name: Test from Server 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            set -e
            echo "=== Test connectivity to 10.8.1.14:8999 ==="
            curl -v --max-time 10 http://10.8.1.14:8999/ 2>&1 | head -15 || echo "Can't reach 10.8.1.14:8999"

            echo ""
            echo "=== Reload nginx ==="
            docker exec facededup-nginx nginx -s reload 2>&1

            echo ""
            echo "=== Test idcentra.com via nginx ==="
            curl -v --max-time 10 -H "Host: idcentra.com" http://127.0.0.1/ 2>&1 | head -15 || echo "FAILED"

            echo ""
            echo "=== Test api.rhwdp.gov.ng via nginx ==="
            curl -sk --max-time 5 -H "Host: api.rhwdp.gov.ng" https://127.0.0.1/ 2>&1 | head -3 || echo "FAILED"
