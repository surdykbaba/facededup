name: Diagnose Servers

on:
  workflow_dispatch:

jobs:
  probe:
    name: Probe 10.8.1.16 from Server 1
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check 10.8.1.16 connectivity
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            echo "=== Ping 10.8.1.16 ==="
            ping -c 3 -W 2 10.8.1.16 || echo "PING FAILED"

            echo ""
            echo "=== Check SSH port 22 ==="
            timeout 5 bash -c 'echo > /dev/tcp/10.8.1.16/22' 2>/dev/null && echo "Port 22 OPEN" || echo "Port 22 CLOSED"

            echo ""
            echo "=== Try SSH ==="
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -o PasswordAuthentication=yes Admin1@10.8.1.16 'echo SSH_SUCCESS' 2>&1 | tail -5 || echo "SSH connection failed"

            echo ""
            echo "=== Scan common ports ==="
            for port in 22 80 443 2222 3389 5900 8000 8080 8443 9090; do
              timeout 2 bash -c "echo > /dev/tcp/10.8.1.16/$port" 2>/dev/null && echo "Port $port OPEN" || true
            done
