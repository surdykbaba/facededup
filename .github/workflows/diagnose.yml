name: Diagnose Load Balancer

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check nginx + load balancer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fix idcentra-api on Server 2
        uses: appleboy/ssh-action@v1
        env:
          SUDO_PASS: ${{ secrets.WORKER_PASSWORD || secrets.DO_PASSWORD }}
        with:
          host: ${{ secrets.WORKER_HOST }}
          username: ${{ secrets.WORKER_USER }}
          password: ${{ secrets.WORKER_PASSWORD }}
          proxy_host: ${{ secrets.DO_HOST }}
          proxy_username: ${{ secrets.DO_USER }}
          proxy_password: ${{ secrets.DO_PASSWORD }}
          envs: SUDO_PASS
          command_timeout: 3m
          script: |
            set -e
            run_sudo() {
              echo "$SUDO_PASS" | sudo -S "$@"
            }

            IDCENTRA_DIR="/var/www/html/idcentra_be"
            cd "$IDCENTRA_DIR"

            echo "=== Current docker-compose.yml ==="
            cat docker-compose.yml

            echo ""
            echo "=== Fix: Add network_mode host for idcentra-api ==="
            # Fix permissions
            run_sudo mkdir -p tmp
            run_sudo chmod 777 tmp

            # Patch docker-compose.yml to use host networking
            # idcentra-api tries to connect to localhost:5432 (native PostgreSQL)
            # but Docker bridge network isolates localhost
            if ! grep -q 'network_mode' docker-compose.yml; then
              echo "Patching docker-compose.yml..."
              run_sudo sed -i '/container_name: idcentra-api/a\    network_mode: "host"' docker-compose.yml
              run_sudo sed -i 's/^\(\s*\)- "15909:15909"/\1# - "15909:15909"/' docker-compose.yml
              echo "Patched!"
            else
              echo "Already has network_mode"
            fi

            echo ""
            echo "=== Patched docker-compose.yml ==="
            cat docker-compose.yml

            echo ""
            echo "=== Restarting idcentra containers ==="
            docker compose down 2>/dev/null || true
            docker compose up -d 2>/dev/null || run_sudo docker compose up -d
            echo "Waiting 20s for Go app to build and start..."
            sleep 20

            echo ""
            echo "=== Container status ==="
            docker ps -a --filter "name=idcentra" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== idcentra-api logs ==="
            docker compose logs --tail=40 idcentra-api 2>/dev/null || docker logs idcentra-api --tail=40 2>&1 || echo "No logs"

            echo ""
            echo "=== Check port 15909 ==="
            run_sudo ss -tlnp | grep 15909 || echo "Port 15909 NOT listening"

            echo ""
            echo "=== Test locally ==="
            curl -v --max-time 10 http://127.0.0.1:15909/ 2>&1 | head -15 || echo "Port 15909 not responding"

      - name: Test from Server 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            set -e
            echo "=== Test connectivity to 10.8.1.14:15909 ==="
            curl -v --max-time 10 http://10.8.1.14:15909/ 2>&1 | head -15 || echo "Can't reach 10.8.1.14:15909"

            echo ""
            echo "=== Reload nginx ==="
            docker exec facededup-nginx nginx -s reload 2>&1

            echo ""
            echo "=== Test idcentra.com via nginx ==="
            curl -v --max-time 10 -H "Host: idcentra.com" http://127.0.0.1/ 2>&1 | head -15 || echo "FAILED"

            echo ""
            echo "=== Test api.rhwdp.gov.ng via nginx ==="
            curl -sk --max-time 5 -H "Host: api.rhwdp.gov.ng" https://127.0.0.1/ 2>&1 | head -3 || echo "FAILED"
