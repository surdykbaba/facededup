name: Diagnose Load Balancer

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check nginx + load balancer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Diagnose via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            set -e
            echo "=== Container status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== Nginx error log (last 20) ==="
            docker logs facededup-nginx --tail=20 2>&1 || echo "No logs"

            echo ""
            echo "=== Nginx config test ==="
            docker exec facededup-nginx nginx -t 2>&1 || echo "Config test failed"

            echo ""
            echo "=== Test: can nginx reach Server 2? ==="
            docker exec facededup-nginx wget -q -O - --timeout=5 http://10.8.1.14/api/v1/health 2>&1 || echo "FAILED to reach Server 2 from nginx container"

            echo ""
            echo "=== Test: can HOST reach Server 2? ==="
            curl -sf --max-time 5 http://10.8.1.14/api/v1/health 2>&1 || echo "FAILED to reach Server 2 from host"

            echo ""
            echo "=== Test: local API on port 8000 ==="
            curl -sf --max-time 5 http://127.0.0.1:8000/api/v1/health 2>&1 || echo "FAILED to reach local API on 8000"

            echo ""
            echo "=== Test: nginx on port 80 ==="
            curl -sf --max-time 5 http://127.0.0.1/api/v1/health 2>&1 || echo "FAILED to reach nginx on port 80"

            echo ""
            echo "=== Nginx upstream status (access log last 10) ==="
            docker logs facededup-nginx --tail=10 2>&1 | grep -E "upstream|502|503|504" || echo "No upstream errors found"

            echo ""
            echo "=== Network: host can reach 10.8.1.14? ==="
            ping -c 2 -W 2 10.8.1.14 2>&1 || echo "Ping failed"

            echo ""
            echo "=== netstat: who's listening on port 80? ==="
            ss -tlnp | grep ':80 ' || echo "Nothing on port 80"

            echo ""
            echo "=== netstat: who's listening on port 8000? ==="
            ss -tlnp | grep ':8000 ' || echo "Nothing on port 8000"
