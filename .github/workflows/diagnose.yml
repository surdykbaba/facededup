name: Diagnose Load Balancer

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check nginx + load balancer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Diagnose via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            set -e
            echo "=== All containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}"

            echo ""
            echo "=== All services listening on ports ==="
            ss -tlnp | head -30

            echo ""
            echo "=== Check for idcentra in Docker ==="
            docker ps -a --format "{{.Names}} {{.Image}} {{.Ports}}" | grep -i "idcent\|rh-\|backend\|front\|web\|app\|node\|next\|react" || echo "No obvious idcentra containers found"

            echo ""
            echo "=== Check for idcentra in systemd ==="
            systemctl list-units --type=service --state=running 2>/dev/null | grep -i "idcent\|node\|next\|pm2\|web\|app" || echo "No matching systemd services"

            echo ""
            echo "=== Check pm2 processes ==="
            pm2 list 2>/dev/null || echo "pm2 not running"

            echo ""
            echo "=== Check nginx configs for idcentra ==="
            find /etc/nginx -name "*.conf" -exec grep -l "idcentra" {} \; 2>/dev/null || echo "No nginx configs mention idcentra"

            echo ""
            echo "=== Check system nginx config ==="
            cat /etc/nginx/sites-enabled/* 2>/dev/null || echo "No sites-enabled"

            echo ""
            echo "=== Docker networks ==="
            docker network ls

            echo ""
            echo "=== Inspect rh-backend container ==="
            docker inspect rh-backend --format '{{.Config.Image}} {{.NetworkSettings.Ports}} {{json .Config.Env}}' 2>/dev/null || echo "rh-backend not found"

            echo ""
            echo "=== Check all listening ports ==="
            ss -tlnp
