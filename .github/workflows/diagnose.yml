name: Diagnose Load Balancer

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check nginx + load balancer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Diagnose via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          password: ${{ secrets.DO_PASSWORD }}
          command_timeout: 3m
          script: |
            set -e
            echo "=== ALL containers (running + stopped) ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}"

            echo ""
            echo "=== Search for idcentra_be everywhere ==="
            docker ps -a --filter "name=idcentra" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}" || echo "No containers matching 'idcentra'"
            docker ps -a --filter "name=_be" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}" || echo "No containers matching '_be'"

            echo ""
            echo "=== Docker images containing idcentra ==="
            docker images | grep -i idcent || echo "No idcentra images found"

            echo ""
            echo "=== Docker compose files on the entire system ==="
            find / -maxdepth 5 -name "docker-compose*" -o -name "compose.yaml" -o -name "compose.yml" 2>/dev/null | head -20

            echo ""
            echo "=== Docker compose files containing idcentra ==="
            grep -rl "idcentra" /home /root /opt /srv /var 2>/dev/null | head -10 || echo "No files containing 'idcentra' found"

            echo ""
            echo "=== System nginx config (if exists) ==="
            cat /etc/nginx/sites-enabled/* 2>/dev/null | head -40 || echo "No system nginx sites-enabled"
            cat /etc/nginx/conf.d/* 2>/dev/null | head -40 || echo "No system nginx conf.d"

            echo ""
            echo "=== Processes listening on ports ==="
            ss -tlnp | grep -E ':80|:443|:5000|:8080|:3000' || echo "No relevant listeners"

            echo ""
            echo "=== What was the old system nginx serving for idcentra? ==="
            grep -r "idcentra" /etc/nginx/ 2>/dev/null | head -10 || echo "No idcentra in system nginx"

            echo ""
            echo "=== rh-backend container details ==="
            docker inspect rh-backend --format '{{.Config.Image}} {{.NetworkSettings.Ports}}' 2>/dev/null || echo "rh-backend not found"

            echo ""
            echo "=== Test api.rhwdp.gov.ng via our nginx ==="
            curl -sf --max-time 5 -H "Host: api.rhwdp.gov.ng" http://127.0.0.1/ 2>&1 | head -5 || echo "FAILED (expected - redirects to HTTPS)"
            curl -skf --max-time 5 https://api.rhwdp.gov.ng 2>&1 | head -5 || echo "HTTPS FAILED"

            echo ""
            echo "=== Test idcentra.com via our nginx ==="
            curl -sf --max-time 5 -H "Host: idcentra.com" http://127.0.0.1/ 2>&1 | head -5 || echo "FAILED (expected - redirects to HTTPS)"

            echo ""
            echo "=== Test port 5000 directly ==="
            curl -sf --max-time 5 http://127.0.0.1:5000/ 2>&1 | head -5 || echo "Port 5000 returned error/empty"

            echo ""
            echo "=== Nginx config test ==="
            docker exec facededup-nginx nginx -t 2>&1
