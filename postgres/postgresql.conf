# PostgreSQL configuration tuned for pgvector with 50M+ face embeddings
# 512-dim float32 vectors = ~100GB vector data + ~200-400GB HNSW index

# ---- Connections ----
listen_addresses = '*'
max_connections = 800

# ---- Memory ----
shared_buffers = 4GB
effective_cache_size = 12GB
work_mem = 32MB                     # SAFE: 32MB × 200 active = 6.4GB (was 512MB = OOM risk)
maintenance_work_mem = 4GB          # Critical for HNSW index creation

# ---- WAL (Write-Ahead Log) ----
wal_buffers = 64MB                  # 1/64 of shared_buffers (was 256MB — wasteful)
max_wal_size = 8GB
min_wal_size = 2GB
checkpoint_completion_target = 0.95

# ---- Bulk Write Performance ----
synchronous_commit = off            # Commits return immediately; WAL flushes async
                                    # Risk: lose last ~100ms of data on crash (acceptable for bulk import)
commit_delay = 10000                # 10ms — batch commits together under concurrent load
commit_siblings = 5                 # Only delay if 5+ transactions are active

# ---- Query Planner ----
random_page_cost = 1.1              # SSD-optimized (default 4.0 is for spinning disks)
effective_io_concurrency = 400      # SSD-optimized

# ---- Logging ----
log_min_duration_statement = 1000   # Log queries slower than 1 second
log_checkpoints = on
log_connections = off
log_disconnections = off

# ---- Autovacuum ----
autovacuum_max_workers = 3
autovacuum_naptime = 60
