services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: facededup-api
    restart: always
    env_file: .env
    environment:
      # Thread limits — prevent ONNX workers from spawning threads for all cores
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-4}
      - OPENBLAS_NUM_THREADS=${OMP_NUM_THREADS:-4}
      - MKL_NUM_THREADS=${OMP_NUM_THREADS:-4}
    ports:
      - "127.0.0.1:8000:8000"  # Expose to host for nginx load balancer
    volumes:
      - image-data:/data/images
      - spoof-data:/data/spoof_samples
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - facededup
    deploy:
      resources:
        limits:
          memory: 48G

  postgres:
    image: pgvector/pgvector:pg16
    container_name: facededup-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"   # Exposed for worker nodes on private network
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - facededup
    deploy:
      resources:
        limits:
          memory: 16G

  redis:
    image: redis:7-alpine
    container_name: facededup-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --bind 0.0.0.0 --protected-mode no
    ports:
      - "6379:6379"   # Exposed for worker nodes on private network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data
    networks:
      - facededup

  nginx:
    image: nginx:1.25-alpine
    container_name: facededup-nginx
    restart: always
    network_mode: host              # Direct access to host network — can reach Server 2 at 10.8.1.14
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

networks:
  facededup:

volumes:
  pgdata:
  redisdata:
  image-data:
  spoof-data:
