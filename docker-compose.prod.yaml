services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: facededup-api
    restart: always
    env_file: .env
    volumes:
      - image-data:/data/images
      - spoof-data:/data/spoof_samples
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - facededup
    deploy:
      resources:
        limits:
          memory: 3G

  postgres:
    image: pgvector/pgvector:pg16
    container_name: facededup-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - facededup
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: facededup-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data
    networks:
      - facededup

  nginx:
    image: nginx:1.25-alpine
    container_name: facededup-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - facededup

networks:
  facededup:

volumes:
  pgdata:
  redisdata:
  image-data:
  spoof-data:
