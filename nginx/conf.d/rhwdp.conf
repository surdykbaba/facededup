# Reverse proxy for api.rhwdp.gov.ng (rh-backend on port 5000)
# Previously served by system nginx — now handled here since facededup nginx
# runs on host network and owns ports 80/443.

server {
    listen 80;
    listen [::]:80;
    server_name api.rhwdp.gov.ng idcentra.com www.idcentra.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.rhwdp.gov.ng;

    ssl_certificate /etc/letsencrypt/live/api.rhwdp.gov.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rhwdp.gov.ng/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }
}
