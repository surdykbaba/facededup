# Reverse proxy for api.rhwdp.gov.ng and idcentra.com (rh-backend on port 5000)
# Previously served by system nginx — now handled here since facededup nginx
# runs on host network and owns ports 80/443.

# --- api.rhwdp.gov.ng: has its own Let's Encrypt cert ---

server {
    listen 80;
    listen [::]:80;
    server_name api.rhwdp.gov.ng;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.rhwdp.gov.ng;

    ssl_certificate /etc/letsencrypt/live/api.rhwdp.gov.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rhwdp.gov.ng/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }
}

# --- idcentra.com: Cloudflare terminates SSL, connects to origin on port 80 ---
# No HTTPS redirect — Cloudflare connects directly to port 80.
# Also serve on 443 with self-signed cert for Cloudflare "Full" SSL mode.

server {
    listen 80;
    listen [::]:80;
    server_name idcentra.com www.idcentra.com;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name idcentra.com www.idcentra.com;

    ssl_certificate /etc/nginx/ssl/idcentra.com.crt;
    ssl_certificate_key /etc/nginx/ssl/idcentra.com.key;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }
}
