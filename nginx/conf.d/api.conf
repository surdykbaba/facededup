upstream facededup_api {
    least_conn;
    server 127.0.0.1:8000    weight=1 max_fails=3 fail_timeout=10s;  # Server 1: 15 workers (also runs PG+Redis)
    server 10.8.1.14:80      weight=2 max_fails=3 fail_timeout=10s;  # Server 2: 35 workers (dedicated API)
    keepalive 64;
}

# HTTP — API requests load-balanced, everything else -> HTTPS
server {
    listen 80;
    server_name face.ninauth.com _;

    location /api/ {
        proxy_pass http://facededup_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /api/v1/health {
        proxy_pass http://facededup_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — load-balanced
server {
    listen 443 ssl;
    http2 on;
    server_name face.ninauth.com;

    ssl_certificate /etc/letsencrypt/live/face.ninauth.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/face.ninauth.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://facededup_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /api/v1/health {
        proxy_pass http://facededup_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
}
