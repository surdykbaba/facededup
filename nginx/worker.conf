# Nginx config for worker nodes.
# Used with docker-compose.worker.yaml on secondary servers.
# Handles both facededup API traffic and idcentra.com reverse proxy.

upstream api {
    server api:8000;
}

# --- FaceDedup API (default) ---
server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 100M;

    location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check — no access log
    location = /api/v1/health {
        proxy_pass http://api;
        access_log off;
    }
}

# --- idcentra.com → native Go backend on host port 8999 ---
# Cloudflare terminates public SSL and connects to origin on port 80 or 443.
# host.docker.internal resolves to the Docker host where the native process runs.

server {
    listen 80;
    listen [::]:80;
    server_name idcentra.com www.idcentra.com;

    location / {
        proxy_pass http://host.docker.internal:8999;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name idcentra.com www.idcentra.com;

    ssl_certificate /etc/nginx/ssl/idcentra.com.crt;
    ssl_certificate_key /etc/nginx/ssl/idcentra.com.key;

    location / {
        proxy_pass http://host.docker.internal:8999;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }
}
